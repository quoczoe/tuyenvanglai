<!DOCTYPE html>
<html lang="vi" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHỢ KÈO VÃNG LAI - ĐẲNG CẤP CẦU LÔNG PHỦI</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

    <div class="theme-container">
        <button class="theme-btn" id="modeSwitcher">
            <i class="fa-solid fa-sun" id="modeIcon"></i>
            <span id="modeText">LIGHT MODE</span>
        </button>
    </div>

    <div class="main-panel">
        <h1>CHỢ KÈO VÃNG LAI</h1>
        <div class="sub-tagline">Nền tảng kết nối phủi chuyên nghiệp</div>
        
        <a href="khach.html" class="btn-gateway btn-khach-style">
            <div class="content-layout">
                <i class="fa-solid fa-magnifying-glass-location icon-prime" style="color: var(--neon-cyan);"></i>
                <span style="font-size: 16px; font-weight: 700;">VÀO TÌM KÈO THƠM</span>
            </div>
            <i class="fa-solid fa-chevron-right icon-arrow"></i>
        </a>

        <a href="host.html" class="btn-gateway btn-host-style">
            <div class="content-layout">
                <i class="fa-solid fa-square-plus icon-prime" style="color: var(--neon-pink);"></i>
                <span style="font-size: 16px; font-weight: 700;">CHỦ SÂN: ĐĂNG CA ĐẤU</span>
            </div>
            <i class="fa-solid fa-chevron-right icon-arrow"></i>
        </a>
        
        <a href="/admin/" class="manage-anchor">System Management</a>
    </div>

    <script>
        const modeSwitcher = document.getElementById('modeSwitcher');
        const rootHtml = document.documentElement;
        const modeIcon = document.getElementById('modeIcon');
        const modeText = document.getElementById('modeText');

        // Đọc cấu hình theme cũ trong ổ nhớ máy, mặc định ban đầu là dark
        const activeTheme = localStorage.getItem('app-theme') || 'dark';
        rootHtml.setAttribute('data-theme', activeTheme);
        toggleInterfaceElements(activeTheme);

        modeSwitcher.addEventListener('click', () => {
            const currentStatus = rootHtml.getAttribute('data-theme');
            const targetStatus = currentStatus === 'dark' ? 'light' : 'dark';
            
            rootHtml.setAttribute('data-theme', targetStatus);
            localStorage.setItem('app-theme', targetStatus);
            toggleInterfaceElements(targetStatus);
        });

        // Hàm hoán đổi text và icon hiển thị realtime cực mượt
        function toggleInterfaceElements(theme) {
            if (theme === 'dark') {
                modeIcon.className = 'fa-solid fa-sun';
                modeText.innerText = 'LIGHT MODE';
            } else {
                modeIcon.className = 'fa-solid fa-moon';
                modeText.innerText = 'DARK MODE';
            }
        }
    </script>

</body>
</html>
