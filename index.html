<!DOCTYPE html>
<html lang="vi" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHỢ KÈO VÃNG LAI - ĐẲNG CẤP SÂN PHỦI</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

    <div class="theme-switch-container">
        <button class="theme-toggle-btn" id="themeToggle">
            <i class="fa-solid fa-sun" id="themeIcon"></i>
            <span id="themeText">Chế độ Sáng</span>
        </button>
    </div>

    <div class="main-container">
        <h1>CHỢ KÈO VÃNG LAI</h1>
        <div class="description">Nền tảng kết nối phủi chuyên nghiệp</div>
        
        <a href="khach.html" class="btn-route btn-khach">
            <div class="btn-text">
                <i class="fa-solid fa-magnifying-glass fa-main" style="color: var(--neon-cyan);"></i>
                <span>VÀO TÌM KÈO THƠM</span>
            </div>
            <i class="fa-solid fa-chevron-right fa-arrow"></i>
        </a>

        <a href="host.html" class="btn-route btn-host">
            <div class="btn-text">
                <i class="fa-solid fa-calendar-plus fa-main" style="color: var(--neon-pink);"></i>
                <span>CHỦ SÂN: ĐĂNG CA ĐẤU</span>
            </div>
            <i class="fa-solid fa-chevron-right fa-arrow"></i>
        </a>
        
        <a href="/admin/" class="sys-link">System Management</a>
    </div>

    <script>
        const themeToggle = document.getElementById('themeToggle');
        const htmlElement = document.documentElement;
        const themeIcon = document.getElementById('themeIcon');
        const themeText = document.getElementById('themeText');

        // Kiểm tra xem người dùng trước đó đã chọn theme gì chưa
        const savedTheme = localStorage.getItem('theme') || 'dark';
        htmlElement.setAttribute('data-theme', savedTheme);
        updateToggleBtn(savedTheme);

        themeToggle.addEventListener('click', () => {
            const currentTheme = htmlElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            
            // Ép trạng thái theme mới lên toàn trang
            htmlElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateToggleBtn(newTheme);
        });

        // Hàm thay đổi icon và chữ của nút gạt theo thời gian thực
        function updateToggleBtn(theme) {
            if (theme === 'dark') {
                themeIcon.className = 'fa-solid fa-sun';
                themeText.innerText = 'Chế độ Sáng';
            } else {
                themeIcon.className = 'fa-solid fa-moon';
                themeText.innerText = 'Chế độ Tối';
            }
        }
    </script>

</body>
</html>
