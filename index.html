<!DOCTYPE html>
<html lang="vi" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHỢ KÈO VÃNG LAI - Sảnh Điều Hướng</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css?v=3.5">
</head>
<body>

    <div class="theme-container">
        <button class="theme-btn" id="btnToggleTheme" aria-label="Đổi chế độ sáng tối">
            <i class="fa-solid fa-moon" id="iconTheme"></i>
            <span id="txtThemeLabel">Giao diện tối</span>
        </button>
    </div>

    <main class="main-panel">
        <div class="header-box">
            <h1 class="title-app">Chợ Kèo Vãng Lai</h1>
            <p class="tagline">Nền tảng kết nối phủi chuyên nghiệp</p>
        </div>

        <div class="gateway-wrapper">
            
            <a href="khach.html" class="btn-gateway btn-khach-style">
                <div class="content-layout">
                    <i class="fa-solid fa-shuttlecock icon-prime"></i>
                    <div class="text-layout">
                        <span>VÀO TÌM KÈO THƠM</span>
                        <small>Quét danh sách ca đấu, đặt slot nhanh</small>
                    </div>
                </div>
                <i class="fa-solid fa-chevron-right icon-arrow"></i>
            </a>

            <a href="host.html" class="btn-gateway btn-host-style">
                <div class="content-layout">
                    <i class="fa-solid fa-calendar-plus icon-prime"></i>
                    <div class="text-layout">
                        <span>CHỦ SÂN: ĐĂNG CA ĐẤU</span>
                        <small>Thiết lập ca, quản lý doanh thu phi tập trung</small>
                    </div>
                </div>
                <i class="fa-solid fa-chevron-right icon-arrow"></i>
            </a>

        </div>

        <div class="footer-bar">
            <a href="/admin/" class="manage-anchor">SYSTEM MANAGEMENT</a>
        </div>
    </main>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const htmlRoot = document.documentElement;
            const btnTheme = document.getElementById("btnToggleTheme");
            const iconTheme = document.getElementById("iconTheme");
            const txtTheme = document.getElementById("txtThemeLabel");

            // Kiểm tra trạng thái lưu trữ cục bộ từ trình duyệt
            const storedTheme = localStorage.getItem('app-theme') || 'dark';
            apDungTheme(storedTheme);

            btnTheme.addEventListener("click", () => {
                const currentTheme = htmlRoot.getAttribute('data-theme');
                const nextTheme = currentTheme === 'dark' ? 'light' : 'dark';
                apDungTheme(nextTheme);
            });

            function apDungTheme(theme) {
                htmlRoot.setAttribute('data-theme', theme);
                localStorage.setItem('app-theme', theme);
                
                if (theme === 'dark') {
                    iconTheme.className = "fa-solid fa-moon";
                    txtTheme.textContent = "Giao diện tối";
                } else {
                    iconTheme.className = "fa-solid fa-sun";
                    txtTheme.textContent = "Giao diện sáng";
                }
            }
        });
    </script>
</body>
</html>
