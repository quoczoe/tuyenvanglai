<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADMIN TỐI CAO - PHẠM MINH QUỐC</title>
    <script src="ket-noi-supabase.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --neon-cyan: #00f3ff; --neon-pink: #ff007f; --dark-bg: #090a10; --card-bg: #131520; --border-color: #25283a; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--dark-bg); color: #ffffff; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .login-box { max-width: 400px; margin: 100px auto; background: var(--card-bg); padding: 30px; border-radius: 12px; border: 2px solid var(--neon-cyan); text-align: center; }
        .admin-panel { display: none; }
        h1 { color: var(--neon-cyan); text-shadow: 0 0 15px rgba(0,243,255,0.4); text-align: center; margin-bottom: 25px; text-transform: uppercase; font-size: 24px; }
        .grid-layout { display: grid; grid-template-columns: 1fr 2fr; gap: 20px; margin-bottom: 20px; }
        .form-card, .table-card { background: var(--card-bg); padding: 20px; border-radius: 12px; border: 1px solid var(--border-color); }
        .form-title { font-size: 16px; font-weight: bold; color: var(--neon-cyan); margin-bottom: 15px; border-left: 4px solid var(--neon-cyan); padding-left: 10px; text-transform: uppercase; }
        .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
        .form-group label { font-size: 13px; color: #a0aec0; font-weight: 600; }
        input, select, textarea { padding: 10px; border-radius: 6px; border: 1px solid var(--border-color); background: #1a1d2e; color: white; font-size: 14px; width: 100%; outline: none; }
        button { padding: 10px 15px; border-radius: 6px; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; display: inline-flex; items-center; justify-content: center; gap: 8px; }
        .btn-cyan { background: linear-gradient(45deg, var(--neon-cyan), #00a8ff); color: #000; width: 100%; }
        .btn-gray { background: #4a5568; color: white; width: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px 10px; border-bottom: 1px solid var(--border-color); text-align: left; font-size: 13px; }
        th { background-color: #1a1d2e; color: var(--neon-cyan); }
        .badge { padding: 3px 6px; border-radius: 4px; font-size: 10px; font-weight: bold; }
        .badge-chua { background: #ff9f43; color: black; }
        .badge-chay { background: #10ac84; color: white; }
        .badge-khoa { background: #ee5253; color: white; }
        .btn-mini { padding: 4px 8px; font-size: 11px; color: white; background: #2d3748; }
        .btn-delete { background: rgba(238,82,83,0.2); color: #ee5253; border: 1px solid rgba(238,82,83,0.4); }
    </style>
</head>
<body>
<div class="container">
    <div id="manHinhLogin" class="login-box">
        <h2><i class="fa-solid fa-shield-halved"></i> Admin Login</h2>
        <div class="form-group"><label>Tài khoản</label><input type="text" id="inputTaiKhoan"></div>
        <div class="form-group"><label>Mật khẩu</label><input type="password" id="inputMatKhau"></div>
        <button class="btn-cyan" onclick="xuLyLogin()">ĐĂNG NHẬP</button>
    </div>

    <div id="manHinhChinh" class="admin-panel">
        <h1>TRẠM QUẢN TRỊ TỐI CAO - QUỐC ZOE</h1>
        
        <div class="form-card" style="margin-bottom: 20px;">
            <div class="form-title">📢 Cấu hình thông báo Popup toàn hệ thống</div>
            <div style="display: flex; gap: 15px;">
                <textarea id="txtThongBaoHeThong" rows="2"></textarea>
                <button class="btn-cyan" onclick="capNhatThongBaoHeThong()" style="width:200px;">ĐỔI THÔNG BÁO</button>
            </div>
        </div>

        <div class="grid-layout">
            <div class="form-card">
                <div class="form-title" id="tieuDeForm">Cấp Mã Key Mới</div>
                <input type="hidden" id="editMode" value="false">
                <div class="form-group">
                    <label>Mã KEY Thuê</label>
                    <div style="display: flex; gap: 8px;">
                        <input type="text" id="maKey" style="font-family: monospace; font-weight: bold; color: var(--neon-cyan);">
                        <button type="button" class="btn-gray" onclick="taoKeyRandom()"><i class="fa-solid fa-dice"></i></button>
                    </div>
                </div>
                <div class="form-group"><label>Tên Host thuê</label><input type="text" id="tenHost"></div>
                <div class="form-group"><label>Số Điện Thoại Host</label><input type="text" id="sdtHost"></div>
                <div class="form-group"><label>Số ngày được xài khi kích hoạt</label><input type="number" id="soNgayDuocXai" value="30"></div>
                <div class="form-group">
                    <label>Gói</label>
                    <select id="capDoKey"><option value="normal">Normal</option><option value="premium">Premium</option></select>
                </div>
                <div class="form-group">
                    <label>Trạng Thái</label>
                    <select id="trangThaiKey"><option value="Chưa kích hoạt">Chưa kích hoạt</option><option value="Đang chạy">Đang chạy</option><option value="Bị khóa">Bị khóa</option></select>
                </div>
                <button class="btn-cyan" onclick="saveKeyData()">LƯU KEY</button>
                <button type="button" class="btn-gray" id="btnHuySua" onclick="cancelEdit()" style="display:none; margin-top:5px; width:100%;">HỦY SỬA</button>
            </div>

            <div class="table-card">
                <div class="form-title">Danh Sách Mã Key Đang Cho Thuê</div>
                <div style="overflow-x:auto;">
                    <table>
                        <thead><tr><th>Mã Key</th><th>Host</th><th>Gói</th><th>Thời Hạn</th><th>Trạng Thái</th><th>Hành Động</th></tr></thead>
                        <tbody id="listKeysBody"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="table-card">
            <div class="form-title">📋 Nhật Ký Bóc Phốt Tín Dụng</div>
            <div style="overflow-x:auto;">
                <table>
                    <thead><tr><th>Người Chấm</th><th>Bị Chấm</th><th>Loại</th><th>Sao</th><th>Nhận Xét</th><th>Hành Động</th></tr></thead>
                    <tbody id="listDanhGiaBody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    const TK_ADMIN = "adminquoc"; const MK_ADMIN = "quoczoe2026";
    function xuLyLogin() {
        if(document.getElementById('inputTaiKhoan').value.trim()===TK_ADMIN && document.getElementById('inputMatKhau').value===MK_ADMIN) {
            document.getElementById('manHinhLogin').style.display='none'; document.getElementById('manHinhChinh').style.display='block';
            loadThongBaoGoc(); loadKeys(); loadDanhGiaTinDung();
        } else { alert('Sai thông tin đăng nhập!'); }
    }
    async function loadThongBaoGoc() {
        const res = await window.khoDuLieuVinhVien.docData('cau_hinh_he_thong', 'id=eq.popup_chinh');
        if(res && res.length > 0) document.getElementById('txtThongBaoHeThong').value = res[0].noi_dung_thong_bao;
    }
    async function capNhatThongBaoHeThong() {
        const text = document.getElementById('txtThongBaoHeThong').value.trim();
        await fetch(`https://kyidswbpfafsoqsdhfpu.supabase.co/rest/v1/cau_hinh_he_thong?id=eq.popup_chinh`, {
            method: 'PATCH', headers: { 'apikey': 'sb_publishable_3Cb5pwmj_zzz88iNiVNmow_JGUWmDzI', 'Authorization': 'Bearer sb_publishable_3Cb5pwmj_zzz88iNiVNmow_JGUWmDzI', 'Content-Type': 'application/json' },
            body: JSON.stringify({ noi_dung_thong_bao: text, ngay_cap_nhat: new Date().toISOString() })
        });
        alert('Đã đổi thông báo popup!');
    }
    function taoKeyRandom() {
        const src = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789"; let c1 = ""; let c2 = "";
        for (let i=0; i<5; i++) c1 += src.charAt(Math.floor(Math.random()*src.length));
        for (let i=0; i<4; i++) c2 += src.charAt(Math.floor(Math.random()*src.length));
        document.getElementById('maKey').value = `TVL-${c1}-${c2}`;
    }
    let listKeysCache = [];
    async function loadKeys() {
        listKeysCache = await window.khoDuLieuVinhVien.docData('quan_ly_key', 'order=ngay_tao.desc');
        const b = document.getElementById('listKeysBody'); b.innerHTML = '';
        listKeysCache.forEach(k => {
            let han = k.ngay_het_han ? new Date(k.ngay_het_han).toLocaleDateString('vi-VN') : k.so_ngay_duoc_xai + ' ngày (Chưa kích)';
            let bg = k.trang_thai==='Đang chạy'?'badge-chay':(k.trang_thai==='Bị khóa'?'badge-khoa':'badge-chua');
            b.innerHTML += `<tr>
                <td style="font-family:monospace; font-weight:bold; color:var(--neon-cyan);">${k.ma_key}</td>
                <td><b>${k.ten_host}</b><br><span style="font-size:11px;color:#cbd5e1;">${k.sdt_host}</span></td>
                <td><b>${k.cap_do.toUpperCase()}</b></td>
                <td>${han}</td>
                <td><span class="badge ${bg}">${k.trang_thai}</span></td>
                <td>
                    <button class="btn-mini" onclick="editKeyData('${k.ma_key}')"><i class="fa-solid fa-pen"></i></button>
                    <button class="btn-mini" onclick="resetDevice('${k.ma_key}')" style="background:#1e3a8a;"><i class="fa-solid fa-mobile"></i> Reset</button>
                    <button class="btn-mini btn-delete" onclick="deleteKey('${k.ma_key}')"><i class="fa-solid fa-trash"></i></button>
                </td>
            </tr>`;
        });
    }
    async function saveKeyData() {
        const key = document.getElementById('maKey').value.trim(); const ten = document.getElementById('tenHost').value.trim();
        const sdt = document.getElementById('sdtHost').value.trim(); const ngay = parseInt(document.getElementById('soNgayDuocXai').value)||30;
        const cd = document.getElementById('capDoKey').value; const tt = document.getElementById('trangThaiKey').value;
        if(!key || !ten || !sdt) return alert('Điền đủ thông tin!');
        const obj = { ma_key: key, ten_host: ten, sdt_host: sdt, so_ngay_duoc_xai: ngay, cap_do: cd, trang_thai: tt };
        if(document.getElementById('editMode').value === "true") {
            await fetch(`https://kyidswbpfafsoqsdhfpu.supabase.co/rest/v1/quan_ly_key?ma_key=eq.${key}`, { method: 'PATCH', headers: { 'apikey': 'sb_publishable_3Cb5pwmj_zzz88iNiVNmow_JGUWmDzI', 'Authorization': 'Bearer sb_publishable_3Cb5pwmj_zzz88iNiVNmow_JGUWmDzI', 'Content-Type': 'application/json' }, body: JSON.stringify(obj) });
            alert('Đã sửa!'); cancelEdit(); loadKeys();
        } else {
            const ok = await window.khoDuLieuVinhVien.ghiData('quan_ly_key', obj);
            if(ok) { alert('Đã thêm Key!'); clearForm(); loadKeys(); }
        }
    }
    function editKeyData(key) {
        const k = listKeysCache.find(i => i.ma_key === key); if(!k) return;
        document.getElementById('editMode').value = "true"; document.getElementById('tieuDeForm').innerText = "Sửa Thông Tin Key";
        document.getElementById('maKey').value = k.ma_key; document.getElementById('maKey').disabled = true;
        document.getElementById('tenHost').value = k.ten_host; document.getElementById('sdtHost').value = k.sdt_host;
        document.getElementById('soNgayDuocXai').value = k.so_ngay_duoc_xai; document.getElementById('capDoKey').value = k.cap_do;
        document.getElementById('trangThaiKey').value = k.trang_thai; document.getElementById('btnHuySua').style.display = "inline-flex";
    }
    function cancelEdit() { document.getElementById('editMode').value = "false"; document.getElementById('tieuDeForm').innerText = "Cấp Mã Key Mới"; document.getElementById('maKey').disabled = false; clearForm(); document.getElementById('btnHuySua').style.display = "none"; }
    function clearForm() { document.getElementById('maKey').value=''; document.getElementById('tenHost').value=''; document.getElementById('sdtHost').value=''; }
    async function resetDevice(key) { if(confirm('Reset máy cố định của Key này?')) { await fetch(`https://kyidswbpfafsoqsdhfpu.supabase.co/rest/v1/quan_ly_key?ma_key=eq.${key}`, { method: 'PATCH', headers: { 'apikey': 'sb_publishable_3Cb5pwmj_zzz88iNiVNmow_JGUWmDzI', 'Authorization': 'Bearer sb_publishable_3Cb5pwmj_zzz88iNiVNmow_JGUWmDzI', 'Content-Type': 'application/json' }, body: JSON.stringify({ id_thiet_bi: "" }) }); alert('Đã xóa khóa chân máy!'); loadKeys(); } }
    async function deleteKey(key) { if(confirm('Xóa Key này?')) { await window.khoDuLieuVinhVien.xoaData('quan_ly_key', 'ma_key', key); loadKeys(); } }
    async function loadDanhGiaTinDung() {
        const data = await window.khoDuLieuVinhVien.docData('danh_gia_tin_dung', 'order=ngay_danh_gia.desc');
        const b = document.getElementById('listDanhGiaBody'); b.innerHTML = '';
        if(data.length===0) { b.innerHTML='<tr><td colspan="6" style="text-align:center;">Trống.</td></tr>'; return; }
        data.forEach(d => {
            b.innerHTML += `<tr><td><b>${d.ten_nguoi_danh_gia}</b><br>${d.sdt_nguoi_danh_gia}</td><td><b>${d.sdt_nguoi_bi_danh_gia}</b></td><td>${d.loai_doi_tuong.toUpperCase()}</td><td style="color:#ff9f43;">${"★".repeat(d.so_sao)}</td><td>${d.nhan_xet}</td><td><button class="btn-mini btn-delete" onclick="xoaPhotAdmin(${d.id})">Gỡ</button></td></tr>`;
        });
    }
    async function xoaPhotAdmin(id) { if(confirm('Xóa đánh giá này?')) { await window.khoDuLieuVinhVien.xoaData('danh_gia_tin_dung', 'id', id); loadDanhGiaTinDung(); } }
</script>
</body>
</html>
