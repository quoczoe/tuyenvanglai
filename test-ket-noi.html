<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Test Kết Nối Supabase</title>
    <style>
        body { font-family: monospace; background: #0f1e35; color: #e2e8f0; padding: 2rem; }
        h2 { color: #00ff88; }
        .ok  { color: #00ff88; }
        .err { color: #ef4444; }
        pre  { background: #162039; padding: 1rem; border-radius: 8px; white-space: pre-wrap; word-break: break-all; }
        button { padding: 10px 20px; background: #00ff88; color: #000; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; margin: 6px 4px; }
    </style>
</head>
<body>
    <h2>🏸 Test Kết Nối Supabase — TUYENVANGLAI.IO.VN</h2>
    <p>Mở F12 → Console để xem log chi tiết. Hoặc xem kết quả ngay bên dưới:</p>

    <button onclick="test1()">1. Đọc cau_hinh_he_thong</button>
    <button onclick="test2()">2. Đọc quan_ly_key</button>
    <button onclick="test3()">3. Đọc ca_dau</button>
    <button onclick="test4()">4. Đọc dat_slot</button>
    <button onclick="testAll()">▶ Chạy tất cả</button>

    <div id="ket-qua" style="margin-top:1.5rem;"></div>

    <script src="ket-noi-supabase.js?v=test"></script>
    <script>
        function hienKetQua(ten, data, err) {
            const div = document.getElementById('ket-qua');
            const cls = err ? 'err' : 'ok';
            const icon = err ? '❌' : '✅';
            const nd = err ? err.message || String(err) : JSON.stringify(data, null, 2);
            div.innerHTML += `<h3 class="${cls}">${icon} ${ten}</h3><pre>${nd}</pre>`;
        }

        async function test1() {
            try {
                const d = await window.khoDuLieuVinhVien.docData('cau_hinh_he_thong', {});
                hienKetQua('cau_hinh_he_thong', d);
            } catch(e) { hienKetQua('cau_hinh_he_thong', null, e); }
        }
        async function test2() {
            try {
                const d = await window.khoDuLieuVinhVien.docData('quan_ly_key', {});
                hienKetQua('quan_ly_key (' + d.length + ' key)', d);
            } catch(e) { hienKetQua('quan_ly_key', null, e); }
        }
        async function test3() {
            try {
                const d = await window.khoDuLieuVinhVien.docData('ca_dau', {});
                hienKetQua('ca_dau (' + d.length + ' ca)', d);
            } catch(e) { hienKetQua('ca_dau', null, e); }
        }
        async function test4() {
            try {
                const d = await window.khoDuLieuVinhVien.docData('dat_slot', {});
                hienKetQua('dat_slot (' + d.length + ' slot)', d);
            } catch(e) { hienKetQua('dat_slot', null, e); }
        }
        async function testAll() {
            document.getElementById('ket-qua').innerHTML = '';
            await test1(); await test2(); await test3(); await test4();
        }

        // Tự động chạy khi load
        window.onload = testAll;
    </script>
</body>
</html>
