<!DOCTYPE html>
<html lang="vi" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHỢ KÈO VÃNG LAI - Tìm Kèo Giao Lưu</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css?v=3.5">
</head>
<body>

    <main class="main-panel">
        <!-- Thanh công cụ điều hướng đỉnh trang -->
        <div class="top-nav-bar">
            <a href="index.html" class="theme-btn" style="text-decoration: none;">
                <i class="fa-solid fa-arrow-left"></i> Sảnh chính
            </a>
            <div id="lblDisplayUser" style="font-size: 0.82rem; font-weight: 700; color: var(--accent-cyan);">
                <i class="fa-solid fa-user-ninja"></i> Đang nạp danh tính...
            </div>
        </div>

        <!-- HANGAR KHU VỰC BỘ LỌC TÌM KIẾM NÂNG CAO -->
        <section class="filter-section">
            <div class="section-title">
                <i class="fa-solid fa-radar"></i> Rà Quét Kèo Phủi
            </div>
            
            <div class="grid-inputs">
                <!-- Dropdown Phân Vùng Miền -->
                <div class="form-group">
                    <label for="selMien">Vùng Miền</label>
                    <select id="selMien" class="select-custom">
                        <option value="">-- Tất cả --</option>
                    </select>
                </div>
                <!-- Dropdown Tỉnh Thành -->
                <div class="form-group">
                    <label for="selTinh">Tỉnh / Thành</label>
                    <select id="selTinh" class="select-custom" disabled>
                        <option value="">-- Chọn Tỉnh --</option>
                    </select>
                </div>
                <!-- Dropdown Quận Huyện -->
                <div class="form-group" class="full-width-input">
                    <label for="selQuan">Quận / Huyện</label>
                    <select id="selQuan" class="select-custom" disabled>
                        <option value="">-- Chọn Quận Huyện --</option>
                    </select>
                </div>
                <!-- Dropdown Trình độ -->
                <div class="form-group">
                    <label for="selTrinhDo">Trình độ</label>
                    <select id="selTrinhDo" class="select-custom">
                        <option value="">Mọi cấp độ</option>
                        <option value="Yếu">Yếu / Mới chơi</option>
                        <option value="Trung bình yếu">Trung bình yếu</option>
                        <option value="Trung bình">Trung bình khá</option>
                        <option value="Khá cứng">Khá cứng / Khủng</option>
                    </select>
                </div>
            </div>

            <button class="btn-action-primary" id="btnScanKeo">
                <i class="fa-solid fa-microchip"></i> TIẾN HÀNH QUÉT KÈO THƠM
            </button>
        </section>

        <!-- KHU VỰC KẾT XUẤT THẺ DỮ LIỆU ĐỘNG -->
        <div class="section-title" style="color: var(--text-primary); padding-left: 5px;">
            <i class="fa-solid fa-fire" style="color: var(--accent-pink);"></i> Trận Đấu Đang Tuyển Vãng Lai
        </div>
        <div class="cards-container" id="vungChuaCardKeo">
            <!-- Dữ liệu thẻ trận đấu sẽ được bơm từ JavaScript vào đây -->
        </div>
    </main>

    <!-- MẠCH 1: MODAL POPUP THÔNG BÁO HỆ THỐNG -->
    <div class="modal" id="popSystem">
        <div class="modal-content">
            <div class="modal-title" style="color: var(--accent-cyan);">
                <i class="fa-solid fa-bullhorn"></i> THÔNG BÁO TỪ HỆ THỐNG
            </div>
            <div class="modal-body-text" id="txtSysBroadcast">Đang truy vấn dữ liệu thông báo từ máy chủ đám mây Supabase...</div>
            <button class="btn-action-primary" id="btnCloseSysModal">XÁC NHẬN ĐÃ ĐỌC</button>
        </div>
    </div>

    <!-- MẠCH 2: MODAL POPUP ĐĂNG NHẬP LƯU VẾT KHÔNG MẬT KHẨU -->
    <div class="modal" id="popUserLogin">
        <div class="modal-content" style="text-align: left;">
            <div class="modal-title" style="color: var(--accent-pink); text-align: center;">
                <i class="fa-solid fa-fingerprint"></i> XÁC MINH DANH TÍNH
            </div>
            <p style="font-size: 0.8rem; color: var(--text-secondary); text-align: center; margin-bottom: 15px;">
                Nhập thông tin để hệ thống ghi vết đặt slot, chống spam ảo.
            </p>
            <div class="form-group" style="margin-bottom: 12px;">
                <label for="txtClientName">Biệt danh / Tên gọi</label>
                <input type="text" id="txtClientName" class="input-custom" placeholder="Ví dụ: Cường Thần Búa">
            </div>
            <div class="form-group" style="margin-bottom: 20px;">
                <label for="txtClientPhone">Số điện thoại Zalo liên hệ</label>
                <input type="tel" id="txtClientPhone" class="input-custom" placeholder="Ví dụ: 09xxxxxxxx">
            </div>
            <button class="btn-action-primary" id="btnSaveUser">KÍCH HOẠT TÀI KHOẢN</button>
        </div>
    </div>

    <!-- KHỐI LIÊN KẾT LIÊN THÔNG DỮ LIỆU NGOẠI VI -->
    <script src="data-dia-ly.js"></script>
    <script src="ket-noi-supabase.js"></script>
    
    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            // Đồng bộ nhanh cấu hình theme từ sảnh chính
            document.documentElement.setAttribute('data-theme', localStorage.getItem('app-theme') || 'dark');
            
            const dbCloud = window.khoDuLieuVinhVien;
            const geoMetadata = window.KHO_DATA_DIA_LY;

            // --- LUỒNG MODAL KÉP TUẦN TỰ (SEQUENTIAL DOUBLE MODAL FLOW) ---
            const modalSys = document.getElementById("popSystem");
            const modalLogin = document.getElementById("popUserLogin");
            
            // Kích hoạt hiển thị Mạch 1
            modalSys.classList.add("active");
            try {
                // Truy vấn cấu hình phát sóng từ bảng cau_hinh_he_thong
                const responseMessage = await dbCloud.layCauHinhHeThong("popup_chinh");
                document.getElementById("txtSysBroadcast").textContent = responseMessage || "Không có thông báo mới.";
            } catch (err) {
                document.getElementById("txtSysBroadcast").textContent = "Không thể kết nối máy chủ Supabase. Đang chạy chế độ Offline.";
            }

            // Đóng mạch 1 nhảy lập tức sang mạch 2
            document.getElementById("btnCloseSysModal").addEventListener("click", () => {
                modalSys.classList.remove("active");
                kiemTraVaKichHoatMach2();
            });

            function kiemTraVaKichHoatMach2() {
                const sdtLuuTru = localStorage.getItem('userSdt');
                const tenLuuTru = localStorage.getItem('userTen');
                if (!sdtLuuTru || !tenLuuTru) {
                    modalLogin.classList.add("active");
                } else {
                    capNhatNhanNguoiDung(tenLuuTru, sdtLuuTru);
                    queryKeoTuCloud(); // Tự động quét kèo khi đã có tài khoản hợp lệ
                }
            }

            document.getElementById("btnSaveUser").addEventListener("click", () => {
                const name = document.getElementById("txtClientName").value.trim();
                const phone = document.getElementById("txtClientPhone").value.trim();
                
                if(!name || !phone) {
                    alert("Vui lòng hoàn thiện toàn bộ trường thông tin!");
                    return;
                }
                localStorage.setItem('userTen', name);
                localStorage.setItem('userSdt', phone);
                modalLogin.classList.remove("active");
                capNhatNhanNguoiDung(name, phone);
                queryKeoTuCloud();
            });

            function capNhatNhanNguoiDung(ten, sdt) {
                document.getElementById("lblDisplayUser").innerHTML = `<i class="fa-solid fa-user-astronaut"></i> ${ten} (${sdt})`;
            }

            // --- LOGIC ĐỔ DỮ LIỆU ĐỊA LÝ CASCADING DROP-DOWNS ---
            const selMien = document.getElementById("selMien");
            const selTinh = document.getElementById("selTinh");
            const selQuan = document.getElementById("selQuan");

            if(geoMetadata) {
                Object.keys(geoMetadata).forEach(mien => {
                    let opt = document.createElement("option");
                    opt.value = mien; opt.textContent = mien;
                    selMien.appendChild(opt);
                });
            }

            selMien.addEventListener("change", () => {
                selTinh.innerHTML = '<option value="">-- Chọn Tỉnh --</option>';
                selQuan.innerHTML = '<option value="">-- Chọn Quận Huyện --</option>';
                selQuan.disabled = true;
                
                if(!selMien.value) { selTinh.disabled = true; return; }
                
                const danhSachTinh = geoMetadata[selMien.value];
                Object.keys(danhSachTinh).forEach(tinh => {
                    let opt = document.createElement("option");
                    opt.value = tinh; opt.textContent = tinh;
                    selTinh.appendChild(opt);
                });
                selTinh.disabled = false;
            });

            selTinh.addEventListener("change", () => {
                selQuan.innerHTML = '<option value="">-- Chọn Quận Huyện --</option>';
                if(!selTinh.value) { selQuan.disabled = true; return; }
                
                const danhSachQuan = geoMetadata[selMien.value][selTinh.value];
                danhSachQuan.forEach(quan => {
                    let opt = document.createElement("option");
                    opt.value = quan; opt.textContent = quan;
                    selQuan.appendChild(opt);
                });
                selQuan.disabled = false;
            });

            // --- ENGINE DỰ ÁN ĐƯỜNG ỐNG DỮ LIỆU ĐỘNG (DYNAMIC RENDER PIPELINE) ---
            document.getElementById("btnScanKeo").addEventListener("click", queryKeoTuCloud);

            async function queryKeoTuCloud() {
                const container = document.getElementById("vungChuaCardKeo");
                container.innerHTML = '<div style="text-align:center; padding:20px; font-size:0.9rem; color:var(--text-secondary);"><i class="fa-solid fa-spinner fa-spin"></i> Đang rà quét đám mây...</div>';

                const BoLoc = {
                    mien: selMien.value,
                    tinh: selTinh.value,
                    quan: selQuan.value,
                    trinhDo: document.getElementById("selTrinhDo").value
                };

                try {
                    // Gọi hàm xử lý truy vấn từ file ket-noi-supabase.js ngoại vi công khai
                    const dataCaDau = await dbCloud.quetDanhSachCaDauActive(BoLoc);
                    container.innerHTML = "";

                    if(dataCaDau.length === 0) {
                        container.innerHTML = '<div style="text-align:center; padding:30px; font-size:0.85rem; color:var(--text-secondary);">Không tìm thấy kèo đấu nào khớp với bộ lọc hiện tại.</div>';
                        return;
                    }

                    dataCaDau.forEach(ca => {
                        const card = document.createElement("div");
                        card.className = "card-keo-phui";
                        
                        // Định dạng tiền tệ VND nội địa hóa
                        const giaNamFormated = ca.gia_nam.toLocaleString('vi-VN') + "đ";
                        const giaNuFormated = ca.gia_nu.toLocaleString('vi-VN') + "đ";

                        card.innerHTML = `
                            <div class="card-header-info">
                                <div>
                                    <div class="court-name">${ca.ten_san} (Sân số ${ca.so_san_cu_the})</div>
                                    <div class="court-address">
                                        <i class="fa-solid fa-location-dot"></i> ${ca.quan_huyen}, ${ca.tinh_thanh}
                                        <a href="${ca.link_maps}" target="_blank" class="map-link">[Bản đồ]</a>
                                    </div>
                                </div>
                                <span class="badge-status">Còn Slot</span>
                            </div>
                            <div class="match-details-grid">
                                <div>Giờ chơi: <strong>${ca.gio_bat_dau} - ${ca.gio_ket_thuc}</strong></div>
                                <div>Ngày: <strong>${ca.ngay_danh}</strong></div>
                                <div>Loại cầu: <strong>${ca.loai_cau_su_dung}</strong></div>
                                <div>Trình độ: <strong>${ca.yeu_cau_trinh_do}</strong></div>
                            </div>
                            <div class="card-action-bar">
                                <div class="price-tag-group">
                                    <span class="price-m"><i class="fa-solid fa-mars"></i> Nam: ${giaNamFormated}</span>
                                    <span class="price-f"><i class="fa-solid fa-venus"></i> Nữ: ${giaNuFormated}</span>
                                </div>
                                <button class="btn-booking" onclick="kichHoatDatSlot('${ca.id}')">ĐẶT SLOT</button>
                            </div>
                        `;
                        container.appendChild(card);
                    });
                } catch (error) {
                    container.innerHTML = '<div style="text-align:center; padding:20px; color:var(--accent-pink);">Lỗi tải dữ liệu. Hãy kiểm tra script kết nối Supabase.</div>';
                }
            }

            // Gắn hàm đặt slot trực tiếp vào cửa sổ để thẻ HTML động thực thi gọi lệnh
            window.kichHoatDatSlot = async function(caDauId) {
                const tenNguoiDung = localStorage.getItem('userTen');
                const sdtNguoiDung = localStorage.getItem('userSdt');
                
                if (!tenNguoiDung || !sdtNguoiDung) {
                    alert("Yêu cầu định danh tài khoản lỗi. Vui lòng tải lại trang.");
                    return;
                }

                if(!confirm(`Xác nhận đăng ký tham gia đặt 1 slot vào trận đấu này?`)) return;

                // Sinh token định danh ngẫu nhiên theo đặc tả kiến trúc
                const tokenSlot = "SLOT-" + Math.floor(10000 + Math.random() * 90000);

                try {
                    const ketQuaInsert = await dbCloud.chenDonDatSlot({
                        ca_dau_id: caDauId,
                        ten_khach: tenNguoiDung,
                        sdt_khach: sdtNguoiDung,
                        ma_slot: tokenSlot
                    });

                    if(ketQuaInsert) {
                        alert(`ĐẶT SLOT THÀNH CÔNG!\nMã định danh của bạn: ${tokenSlot}\nChủ sân sẽ liên hệ bạn qua Zalo.`);
                        queryKeoTuCloud();
                    }
                } catch (err) {
                    alert("Đặt slot thất bại do lỗi xử lý luồng ghi dữ liệu đám mây.");
                }
            }
        });
    </script>
</body>
</html>
